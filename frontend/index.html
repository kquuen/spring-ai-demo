<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI 通义千问聊天助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-robot"></i> AI助手</h1>
                <p class="subtitle">基于Spring AI + 通义千问</p>
            </div>
            
            <div class="session-section">
                <h3><i class="fas fa-comments"></i> 当前会话</h3>
                <div class="session-info">
                    <div class="session-id">
                        <span>ID:</span>
                        <code id="current-session">未创建</code>
                    </div>
                    <button id="new-session" class="btn btn-outline">
                        <i class="fas fa-plus"></i> 新会话
                    </button>
                </div>
            </div>
            
            <div class="roles-section">
                <h3><i class="fas fa-user-tie"></i> 角色选择</h3>
                <div class="roles-list" id="roles-list">
                    <!-- 角色将通过JS动态加载 -->
                </div>
            </div>
            
            <div class="settings-section">
                <h3><i class="fas fa-cog"></i> 设置</h3>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="stream-toggle" checked>
                        启用流式响应
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="typing-effect" checked>
                        打字机效果
                    </label>
                </div>
                <div class="setting-item">
                    <label>温度:</label>
                    <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7">
                    <span id="temp-value">0.7</span>
                </div>
            </div>
            
            <div class="status-section">
                <div class="status-item">
                    <i class="fas fa-database"></i>
                    <span>Redis: <span class="status-indicator" id="redis-status">未知</span></span>
                </div>
                <div class="status-item">
                    <i class="fas fa-brain"></i>
                    <span>AI模型: <span id="model-status">qwen-turbo</span></span>
                </div>
            </div>
        </div>
        
        <!-- 主聊天区域 -->
        <div class="main-content">
            <div class="chat-header">
                <h2><i class="fas fa-comment-dots"></i> 智能对话</h2>
                <div class="header-actions">
                    <button id="clear-chat" class="btn btn-danger">
                        <i class="fas fa-trash"></i> 清空对话
                    </button>
                    <button id="export-chat" class="btn btn-outline">
                        <i class="fas fa-download"></i> 导出
                    </button>
                </div>
            </div>
            
            <div class="chat-container">
                <div class="messages-container" id="messages-container">
                    <!-- 消息将通过JS动态添加 -->
                    <div class="welcome-message">
                        <div class="message-bubble system">
                            <div class="message-header">
                                <i class="fas fa-robot"></i>
                                <span>AI助手</span>
                            </div>
                            <div class="message-content">
                                欢迎使用Spring AI通义千问聊天助手！<br>
                                请选择左侧角色开始对话，或直接输入您的问题。
                            </div>
                            <div class="message-time">现在</div>
                        </div>
                    </div>
                </div>
                
                <div class="input-area">
                    <div class="input-container">
                        <textarea 
                            id="message-input" 
                            placeholder="输入您的问题... (Shift+Enter换行，Enter发送)"
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <button id="send-btn" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i> 发送
                            </button>
                            <button id="stop-btn" class="btn btn-danger" style="display: none;">
                                <i class="fas fa-stop"></i> 停止
                            </button>
                        </div>
                    </div>
                    <div class="input-hints">
                        <span><i class="fas fa-lightbulb"></i> 提示：可以询问编程、翻译、写作等问题</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div id="loading" class="loading-overlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>AI正在思考...</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
